<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuskApp - Learn Basque</title>
    
    <!-- Manifest for PWA -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Icons for different devices -->
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EuskApp">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main container where screens are loaded -->
    <div id="app"></div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/data.js"></script>
    <script src="js/screens/login.js"></script>
    <script src="js/screens/menu.js"></script>
    <script src="js/screens/study.js"></script>
    <script src="js/screens/phrases.js"></script>
    <script src="js/screens/addcontent.js"></script>
    <script src="js/screens/challenges.js"></script>
    <script src="js/screens/statistics.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
