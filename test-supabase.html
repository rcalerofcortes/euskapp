<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-item {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }
        .success {
            background: #e8f5e9;
            border-color: #4caf50;
        }
        .error {
            background: #ffebee;
            border-color: #f44336;
        }
        .pending {
            background: #fff3e0;
            border-color: #ff9800;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🧪 EuskApp - Supabase Connection Test</h1>
    <p>This page tests if Supabase is loading correctly.</p>
    
    <div id="tests"></div>
    
    <h2>Console Output:</h2>
    <pre id="console-output"></pre>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const testsDiv = document.getElementById('tests');
        const consoleOutput = document.getElementById('console-output');
        let logs = [];
        
        function log(message) {
            console.log(message);
            logs.push(message);
            consoleOutput.textContent = logs.join('\n');
        }
        
        function addTest(title, success, details = '') {
            const div = document.createElement('div');
            div.className = `test-item ${success ? 'success' : 'error'}`;
            div.innerHTML = `
                <strong>${success ? '✅' : '❌'} ${title}</strong>
                ${details ? `<p style="margin: 5px 0 0 0; color: #666;">${details}</p>` : ''}
            `;
            testsDiv.appendChild(div);
        }
        
        log('Starting tests...');
        
        // Test 1: Check if Supabase library loaded
        if (typeof window.supabase !== 'undefined') {
            addTest('Supabase library loaded', true, 'window.supabase is available');
            log('✅ Supabase library detected');
            
            // Test 2: Create client
            try {
                const SUPABASE_URL = 'https://uizqufaegpqeehasqxks.supabase.co';
                const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpenF1ZmFlZ3BxZWVoYXNxeGtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MzY0MTIsImV4cCI6MjA5NDIxMjQxMn0.61V2_0Ya3pimD1Y3PiFVPIW4SHlenC13mJJ_OW1XIsk';
                
                const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                addTest('Supabase client created', true, 'Client initialized successfully');
                log('✅ Client created');
                
                // Test 3: Try to fetch phrases
                log('Fetching phrases from database...');
                client
                    .from('phrases')
                    .select('*')
                    .then(({ data, error }) => {
                        if (error) {
                            addTest('Fetch phrases from database', false, `Error: ${error.message}`);
                            log(`❌ Error fetching phrases: ${error.message}`);
                        } else {
                            addTest('Fetch phrases from database', true, `Found ${data.length} phrases`);
                            log(`✅ Fetched ${data.length} phrases`);
                            log('Phrases:', JSON.stringify(data, null, 2));
                        }
                    });
                
            } catch (error) {
                addTest('Supabase client creation', false, error.message);
                log(`❌ Error creating client: ${error.message}`);
            }
            
        } else {
            addTest('Supabase library loaded', false, 'window.supabase is undefined');
            log('❌ Supabase library NOT loaded');
        }
        
        // Test 4: Check if all scripts would load
        const scripts = [
            'js/supabase-client.js',
            'js/storage.js',
            'js/data.js',
            'js/screens/login.js',
            'js/screens/menu.js',
            'js/screens/study.js',
            'js/screens/phrases.js',
            'js/screens/addcontent.js',
            'js/screens/challenges.js',
            'js/screens/statistics.js',
            'js/app.js'
        ];
        
        log('Checking if script files exist...');
        Promise.all(scripts.map(script => 
            fetch(script, { method: 'HEAD' })
                .then(response => ({ script, exists: response.ok }))
                .catch(() => ({ script, exists: false }))
        )).then(results => {
            results.forEach(({ script, exists }) => {
                addTest(`File exists: ${script}`, exists, exists ? 'File found' : 'File not found');
                log(exists ? `✅ ${script}` : `❌ ${script} NOT FOUND`);
            });
        });
    </script>
</body>
</html>
